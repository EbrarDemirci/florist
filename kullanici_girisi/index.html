<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="intro">
        <div class="video-container">
            <video src="C:\Users\sakir\OneDrive\Desktop\florist\florist\kullanicigiris\arkaplan giriş.mp4" autoplay loop muted playsinline></video>
        </div>
        <div class="content">
            <h1>Hoş Geldiniz</h1>
            <h4>Arka Plan için Tam Ekran Video Örneği</h4>
            <a href="#login" class="read-more">Giriş Yap</a>
        </div>
    </section>
    
    <div class="container" id="login">
        <div id="LoginAndRegistrationForm">
            <h1 id="formTitle">Giriş Yap</h1>
            <div id="formSwitchBtn">
                <button onclick="ShowLoginForm()" id="ShowLoginBtn" class="active">Login</button>
                <button onclick="ShowRegistrationForm()" id="ShowRegistrationBtn">Register</button>
            </div>
            <div id="LoginFrom">
                <form action="#">
                    <input id="LoginEmail" class="input-text" type="text" placeholder="Email Address">
                    <input id="LoginPassword" class="input-text" type="password" placeholder="Password">
                    <div class="remember-me">
                        <input id="rememberMe" type="checkbox">
                        <label for="rememberMe">Beni Hatırla</label>
                    </div>
                    <input class="Submit-Btn" type="submit" value="Giriş Yap">
                </form>
                <p class="already-have-account">
                    Hesabınız yok mu? <a href="JavaScript:void(0);" onclick="ShowRegistrationForm()">Kayıt Ol</a>
                </p>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
